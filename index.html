<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form Validation</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="info-box">
        <h2>Form</h2>
        <p>Need to get error messages</p>
        <ul>
          <li>When no text is entered</li>
          <li>When number of character is greater than 140</li>
          <li>Otherwise, message has to be added below</li>
        </ul>
      </div>

      <div class="main">
        <h2>What are you humming about?</h2>

        <form id="form">
          <textarea id="input" placeholder="Write something..."></textarea>

          <div class="bottom">
            <button type="submit">ENTER</button>
            <span id="counter">140</span>
          </div>
        </form>

        <p id="error-msg"></p>

        <div id="container"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
